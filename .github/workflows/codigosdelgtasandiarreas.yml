name: Build & Release APK

on:
  push:
    tags:
      - "v-android*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Instalar librerías Haxe
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib run lime setup

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK r21e
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"

      - name: Configurar lime para Android
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_SDK_ROOT/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Verificar NDK y assets
        run: |
          echo "NDK en uso: $ANDROID_NDK_ROOT"
          ls $ANDROID_SDK_ROOT/ndk/
          echo "--- Assets presentes ---"
          find Android/androidBuild/app/assets -type f 2>/dev/null || echo "assets aun no generados (normal)"
          echo "--- Icono presente ---"
          ls Android/androidBuild/app/assets/icons/ 2>/dev/null || echo "icono no encontrado aun"

      - name: Build normal release
        run: bash Android/androidBuild/build.sh normal

      - name: Build caros debug edition
        run: bash Android/androidBuild/build.sh caros

      - name: Subir APKs al Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Android/androidBuild/dist/*.apk
          fail_on_unmatched_files: true
          update: true   # ← esto permite actualizar un release existente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}